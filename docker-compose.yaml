services:
  newsbot:
    container_name: newsbot
    image: chyiyaqing/newsbot:latest
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - ./newsbot.yaml:/app/newsbot.yaml:ro
      - ./.env:/app/.env:ro
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    container_name: newsbot-frontend
    image: chyiyaqing/newsbot-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - newsbot
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
