services:
  newsbot:
    container_name: newsbot
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./newsbot.yaml:/app/newsbot.yaml:ro
      - ./.env:/app/.env:ro
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
